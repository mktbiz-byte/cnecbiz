[build]
  command = "pnpm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 통합 관제센터 - 4개 DB 동시 조회로 타임아웃 연장
[functions."check-data-sync"]
  timeout = 60

# 영상 업로드 - DB 업데이트 전용 (알림은 notify-video-upload로 분리)
[functions."save-video-upload"]
  timeout = 30

# 영상 업로드 알림 전용 (네이버웍스+카카오+이메일)
[functions."notify-video-upload"]
  timeout = 20

[functions."webhook-video-submission"]
  timeout = 30

# AI 생성 함수 - 타임아웃 연장 (모든 Gemini API 함수)
[functions."generate-scene-guide"]
  timeout = 60

[functions."generate-personalized-guide"]
  timeout = 60

[functions."generate-newsletter-image"]
  timeout = 60

[functions."analyze-newsletter-seo"]
  timeout = 60

[functions."generate-4week-challenge-guide"]
  timeout = 60

[functions."generate-campaign-guide"]
  timeout = 60

[functions."analyze-youtube-shorts"]
  timeout = 120

[functions."generate-capi-profile"]
  timeout = 60

[functions."generate-oliveyoung-final-guide"]
  timeout = 60

[functions."generate-oliveyoung-guide"]
  timeout = 60

[functions."regenerate-personalized-guide"]
