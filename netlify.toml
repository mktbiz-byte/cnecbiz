[build]
  command = "pnpm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 통합 관제센터 - 4개 DB 동시 조회로 타임아웃 연장
[functions."check-data-sync"]
  timeout = 60

# 영상 업로드 - DB 업데이트 전용 (알림은 notify-video-upload로 분리)
[functions."save-video-upload"]
  timeout = 30

# 영상 업로드 알림 전용 (네이버웍스+카카오+이메일)
[functions."notify-video-upload"]
  timeout = 20

[functions."webhook-video-submission"]
  timeout = 30

# AI 생성 함수 - 타임아웃 연장 (모든 Gemini API 함수)
[functions."generate-scene-guide"]
  timeout = 60

[functions."generate-personalized-guide"]
  timeout = 60

[functions."generate-newsletter-image"]
  timeout = 60

[functions."analyze-newsletter-seo"]
  timeout = 60

[functions."generate-4week-challenge-guide"]
  timeout = 60

[functions."generate-campaign-guide"]
  timeout = 60

[functions."analyze-youtube-shorts"]
  timeout = 120

[functions."generate-capi-profile"]
  timeout = 60

[functions."generate-oliveyoung-final-guide"]
  timeout = 60

[functions."generate-oliveyoung-guide"]
  timeout = 60

[functions."regenerate-personalized-guide"]
  timeout = 60

# Scheduled Functions
[functions."scheduled-collect-transactions"]
  schedule = "* * * * *"  # 매 1분마다 실행

[functions."scheduled-unmatched-deposits-alert"]
  schedule = "0 7 * * *"  # 매일 오후 4시 (한국시간 = UTC+9)

# 소속 크리에이터 모니터링은 scheduled-weekly-report에서 통합 처리
# [functions."scheduled-creator-monitoring"]
#   schedule = "0 1 * * 1"  # 주간 리포트로 변경 (기존: 매일)

[functions."report-daily"]
  schedule = "0 1 * * *"  # 매일 오전 10시 (한국시간 = UTC+9) - 일일 리포트

[functions."scheduled-youtube-update-check"]
  schedule = "0 0 * * *"  # 매일 오전 9시 (한국시간 = UTC+9)

[functions."scheduled-campaign-deadline-notification"]
  schedule = "15 1 * * *"  # 임시: 즉시 실행 테스트 (10:15 KST)

[functions."scheduled-video-deadline-notification"]
  schedule = "15 1 * * *"  # 매일 오전 10:15 (KST) - 마감 전 알림 (3일전/2일전/당일)

[functions."scheduled-video-overdue-notification"]
  schedule = "15 1 * * *"  # 매일 오전 10:15 (KST) - 마감 지연 알림 (1일/3일/5일 지연)


[functions."scheduled-overdue-notification"]
  schedule = "0 1 * * *"  # 매일 오전 10시 (한국시간 = UTC+9) - 영상 제출 지연 알림

[functions."scheduled-weekly-report"]
  schedule = "0 1 * * 1"  # 매주 월요일 오전 10시 (한국시간 = UTC+9) - 통합 주간 리포트

# 출금 주간 보고서는 scheduled-weekly-report로 통합됨 - 스케줄 비활성화
# [functions."scheduled-weekly-withdrawal-report"]
#   schedule = "0 1 * * 1"

[functions."scheduled-sns-upload"]
  schedule = "*/30 * * * *"  # 30분마다 - 예약 업로드 처리 및 성과 데이터 수집

# 구글 시트 → 스티비 주소록 자동 싱크
# 한국/일본: 매일 오후 5시 KST (UTC 08:00)
[functions."scheduled-stibee-sync"]
  schedule = "0 8 * * *"

# 미국: 매일 오전 10시 EST (UTC 15:00) - 화~목 활동 활발
[functions."scheduled-stibee-sync-us"]
  schedule = "0 15 * * *"

[functions."generate-sns-content"]
  timeout = 60

[functions."upload-to-youtube"]
  timeout = 300  # 5분 - 영상 업로드

[functions."upload-to-instagram"]
  timeout = 300

[functions."upload-to-tiktok"]
  timeout = 300

# ============================================================
# OpenClo (오픈클로) 설정
# ============================================================

# 오픈클로 봇 크롤링 (매 30분)
[functions."scheduled-openclo-crawl"]
  schedule = "*/30 * * * *"
  timeout = 120

# 오픈클로 이메일 자동 발송 (매일 오전 10시 KST = UTC 01:00)
[functions."scheduled-openclo-email"]
  schedule = "0 1 * * *"
  timeout = 120

# 오픈클로 일일 리포트 → 네이버웍스 (매일 오후 6시 KST = UTC 09:00)
[functions."scheduled-openclo-report"]
  schedule = "0 9 * * *"

# 오픈클로 가입 여부 재확인 (매시간)
[functions."scheduled-openclo-registration-check"]
  schedule = "0 * * * *"

# 오픈클로 AI 분석 타임아웃
[functions."openclo-ai-analyze"]
  timeout = 60

[functions."openclo-bot-youtube"]
  timeout = 60

[functions."openclo-bot-instagram"]
  timeout = 60

[functions."openclo-bot-tiktok"]
  timeout = 60

# ============================================================
# 카카오 AI 챗봇 설정
# ============================================================

# 프롬프트 테스트 (Gemini API 호출)
[functions."chatbot-test-prompt"]
  timeout = 60

# 크리에이터 데이터 조회 (멀티-리전 순회)
[functions."chatbot-creator-data"]
  timeout = 30

# 사용자 본인 확인 (멀티-리전 순회)
[functions."chatbot-verify-user"]
  timeout = 30

# 챗봇 대화 데이터 정리 (매일 오후 12시 KST = UTC 03:00)
[functions."scheduled-chatbot-cleanup"]
  schedule = "0 3 * * *"

# 챗봇 일일 리포트 → 네이버웍스 (매일 오전 9시 KST = UTC 00:00)
[functions."scheduled-chatbot-daily-report"]
  schedule = "0 0 * * *"

# 오픈클로 IP 제한 Edge Function
[[edge_functions]]
  function = "ip-restrict-openclo"
  path = "/admin/openclo/*"

# SEO: Sitemaps
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/sitemap-newsletters.xml"
  to = "/.netlify/functions/newsletter-sitemap"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
