  # schedule = "0 0 * * *"  # 비활성화: 네이버웍스 리포트

# 출금 결재 자동 상신 (매주 월~금 오전 10시 KST = UTC 01:00)
[functions."scheduled-daily-withdrawal-approval"]
  # schedule = "0 1 * * 1-5"  # 비활성화: 네이버웍스 결재 상신

# Discovery IP 제한 Edge Function (구 OpenClo)
[[edge_functions]]
  function = "ip-restrict-openclo"
  path = "/admin/discovery/*"

# SEO: Sitemaps
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/sitemap-newsletters.xml"
  to = "/.netlify/functions/newsletter-sitemap"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
